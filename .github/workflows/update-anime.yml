- name: Create data directory
  run: mkdir -p data

- name: Download anime database
  run: |
    curl -fL \
      https://github.com/manami-project/anime-offline-database/releases/download/2026-05/anime-offline-database.json \
      -o data/anime-offline-database.json

- name: Verify downloaded file
  run: |
    ls -lah data
    python - <<'PY'
    from pathlib import Path
    import json

    p = Path("data/anime-offline-database.json")
    print("Existe?", p.exists())
    print("Tamanho:", p.stat().st_size if p.exists() else 0)

    if not p.exists():
        raise FileNotFoundError("Arquivo não foi baixado")

    if p.stat().st_size < 1000:
        raise ValueError("Arquivo baixado é pequeno demais e provavelmente inválido")

    with open(p, "r", encoding="utf-8") as f:
        raw = json.load(f)

    print("Chaves do JSON:", list(raw.keys())[:10])
    print("Qtd em data:", len(raw.get("data", [])))
    PY
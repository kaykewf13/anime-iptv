name: Update Anime IPTV Catalog

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"  # Atualiza a cada 12 horas

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 1. Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 2. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 3. Instalar dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 📁 4. Criar diretórios necessários
      - name: Create directories
        run: |
          mkdir -p data
          mkdir -p output
          mkdir -p docs
          mkdir -p scripts

      # 📊 5. Baixar o Anime Offline Database
      - name: Download Anime Offline Database
        run: |
          curl -fL \
            https://sourceforge.net/projects/anime-offline-database.mirror/files/latest/download \
            -o data/anime-offline-database-minified.json

      # 🔍 6. Verificar arquivo baixado
      - name: Verify downloaded database
        run: |
          ls -lah data
          python - <<'PY'
          from pathlib import Path
          import json

          p = Path("data/anime-offline-database-minified.json")
          print("Arquivo existe:", p.exists())
          print("Tamanho:", p.stat().st_size if p.exists() else 0)

          if not p.exists():
              raise FileNotFoundError("Arquivo não foi baixado.")

          if p.stat().st_size < 1000:
              raise ValueError("Arquivo inválido ou corrompido.")

          with open(p, "r", encoding="utf-8") as f:
              raw = json.load(f)

          print("Chaves do JSON:", list(raw.keys())[:10])
          print("Total de animes:", len(raw.get("data", [])))
          PY

      # 🧩 7. Garantir arquivo de fontes oficiais
      - name: Ensure official sources file exists
        run: |
          if [ ! -f data/official_sources.json ]; then
            echo "[]" > data/official_sources.json
          fi

      # 🏗️ 8. Gerar catálogo base
      - name: Run build_catalog.py
        run: python scripts/build_catalog.py

      # 🔗 9. Mesclar fontes oficiais aprovadas
      - name: Merge approved sources
        run: python scripts/build_sources_merge.py

      # 📡 10. Gerar playlist de canais IPTV
      - name: Run build_m3u.py
        run: python scripts/build_m3u.py

      # 📺 11. Gerar playlists de séries
      - name: Run build_series_m3u.py
        run: python scripts/build_series_m3u.py

      # 🗂️ 12. Gerar playlists por categoria
      - name: Generate category M3U files
        run: python scripts/build_category_m3u.py

      # 🎬 13. Gerar séries de animes concluídos
      - name: Generate completed anime series M3U
        run: python scripts/build_completed_anime_series_m3u.py

      # 📊 14. Gerar séries agrupadas por episódios
      - name: Generate grouped completed anime series M3U
        run: python scripts/build_completed_anime_series_grouped_m3u.py

      # 🏆 15. Gerar Top 20 animes concluídos
      - name: Generate Top 20 completed anime series M3U
        run: python scripts/build_top20_completed_anime_series_m3u.py

      # 🎞️ 16. Gerar playlists VOD
      - name: Generate VOD series M3U
        run: python scripts/build_vod_series_m3u.py

      # 📡 17. Gerar playlist mestra
      - name: Generate master M3U playlist
        run: python scripts/build_master_m3u.py

      # ✅ 18. Validar URLs da playlist mestra
      - name: Validate master M3U playlist
        run: python scripts/validate_m3u_streams.py

      # 🌐 19. Gerar páginas HTML do site
      - name: Run build_pages.py
        run: python scripts/build_pages.py

      # 🚀 20. Publicar arquivos no GitHub Pages
      - name: Publish playlists to GitHub Pages docs
        run: python scripts/publish_pages.py

      # 💾 21. Commit e push das atualizações
      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data output docs
          git diff --cached --quiet || git commit -m "chore: update anime IPTV catalog"
          git push
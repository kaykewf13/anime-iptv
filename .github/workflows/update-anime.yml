name: Update Anime

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Download anime database
        run: |
          curl -L \
            https://github.com/manami-project/anime-offline-database/releases/latest/download/anime-offline-database.json \
            -o data/anime-offline-database.json

      - name: Verify downloaded file
        run: |
          ls -lah data
          python - <<'PY'
          from pathlib import Path
          p = Path("data/anime-offline-database.json")
          print("Existe?", p.exists())
          print("Tamanho:", p.stat().st_size if p.exists() else 0)
          PY

      - name: Build catalog, playlist and pages
        run: |
          python scripts/build_catalog.py
          python scripts/build_m3u.py
          python scripts/build_pages.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data output docs
          git diff --cached --quiet || git commit -m "chore: update anime catalog"
          git push